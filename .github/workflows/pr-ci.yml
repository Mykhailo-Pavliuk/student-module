name: PR Quality Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  conventions:
    name: Branch & commit conventions
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ -z "$BRANCH" ]]; then
            echo "Unable to detect branch name for this pull request."
            exit 1
          fi
          if [[ ! "$BRANCH" =~ ^SP-[0-9]+$ ]]; then
            echo "Branch '$BRANCH' must follow the pattern SP-<number> (e.g., SP-9)."
            exit 1
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}

      - name: Validate commit messages
        run: |
          COMMITS=$(git log --format=%s origin/${{ github.event.pull_request.base.ref }}..HEAD)
          if [ -z "$COMMITS" ]; then
            echo "No commits found between base and head."
            exit 1
          fi
          BAD=$(echo "$COMMITS" | grep -Ev '^SP-[0-9]+: .+' || true)
          if [ -n "$BAD" ]; then
            echo "The following commit messages violate the format SP-123: Description:"
            echo "$BAD"
            exit 1
          fi

  build:
    name: Compile all C++ sources
    runs-on: windows-latest
    needs: conventions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure source-only C++ project structure
        shell: pwsh
        run: |
          $blocked = Get-ChildItem -Path .\app,.\tasks -Recurse -File |
            Where-Object { $_.Name -match '\.(sln|vcxproj|vcxproj\.filters|vcxproj\.user)$' }

          if ($blocked.Count -gt 0) {
            Write-Error "Project metadata files are not allowed. Keep only source files (e.g., .cpp) in app/ and tasks/."
            $blocked | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Compile C++ sources by folder
        shell: pwsh
        run: |
          $cppFiles = Get-ChildItem -Path .\app,.\tasks -Recurse -Filter *.cpp -File

          if ($cppFiles.Count -eq 0) {
            Write-Error "No .cpp files found under app/ or tasks/."
            exit 1
          }

          $outDir = Join-Path $env:RUNNER_TEMP "cpp-build"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          $groups = $cppFiles | Group-Object DirectoryName | Sort-Object Name

          $index = 0
          foreach ($group in $groups) {
            $index += 1
            $exe = Join-Path $outDir ("program-" + $index + ".exe")

            $sources = $group.Group | Sort-Object FullName | ForEach-Object { $_.FullName }
            Write-Host "Compiling folder $($group.Name)"
            foreach ($source in $sources) {
              Write-Host "  - $source"
            }

            & cl.exe /nologo /std:c++17 /EHsc /W3 /WX- /O2 /utf-8 /Fe:$exe $sources
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
